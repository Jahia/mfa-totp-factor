# default configuration - won't be overridden
# MFA shared extensions configuration. The marker line above tells Jahia's module extender NOT
# to overwrite the deployed <karaf>/etc/org.jahia.modules.mfa.extensions.cfg on restart, so
# operator edits survive; the components re-read them live (on @Modified).
#
# This PID is shared by the factor-agnostic infrastructure in the mfa-factors-extensions bundle:
# the /cms/login gate (MfaLoginGateFilter) and — see the section added by the login/logout URL
# provider — the redirect URLs. It replaces the equivalent keys that previously lived under
# org.jahia.modules.totp. MIGRATION: existing deployments must move loginGate.* (and loginUrl /
# logoutUrl) from org.jahia.modules.totp to this PID.

# --- Global enrollment policy (MfaGlobalPolicy) --------------------------------
# Comma-separated factor types that are ENFORCED platform-wide (e.g. totp,webauthn).
# A user must have AT LEAST ONE of these configured and verify ONE of them at sign-in;
# a user with none configured is taken through inline enrollment on the login page once
# the grace window below has elapsed. Empty (default) = no enforcement: factors stay
# opt-in per site and never block a user who has not set them up.
# NOTE: per-site activation still applies — a factor must also be enabled on the site
# (each factor's administration page) to take part.
enforcedFactors=

# Grace window in DAYS before enforcement becomes hard-required for a user who has none
# of the enforced factors configured (counted per user from their first enforced sign-in
# attempt). 0 = immediate. Clamped to 0..365.
graceDays=0

# --- /cms/login gate (MfaLoginGateFilter) --------------------------------------
# Jahia's legacy /cms/login endpoint authenticates with username/password only and
# never consults MFA factors — while enforcement is active (enforcedFactors above) it
# is a complete second-factor bypass. When enabled, this gate rejects /cms/login with
# 403 while an enforced factor is enabled on the request's site (identifiable via the
# `site` parameter, otherwise when ANY site has one enabled), unless the client IP
# matches the whitelist below.
#
# OFF by default on purpose: enabling it with an empty whitelist locks everyone
# (including platform administrators) out of /cms/login as soon as one site
# enforces enrollment. Set the whitelist FIRST, then flip this to true.
loginGate.enabled=false

# Comma-separated IPv4/IPv6 addresses or CIDR blocks allowed through the gate.
# The client IP is the FIRST X-Forwarded-For entry when present (set by your
# reverse proxy), else the socket address. SECURITY: X-Forwarded-For is
# client-spoofable — only enable the gate behind a proxy that overwrites it.
# Example: loginGate.ipWhitelist=203.0.113.7, 10.0.0.0/8, 2001:db8::/32
loginGate.ipWhitelist=

# --- Login / logout URL provider (MfaLoginLogoutProvider) ----------------------
# These are the GLOBAL DEFAULTS for the shared login/logout URL provider, which routes
# unauthenticated users to the MFA login UI (username/password, then a choice between the
# enrolled factors — TOTP, WebAuthn, ...). Each site can override them from its factor
# administration page; a per-site value (surfaced by any factor through the MfaSiteProvider
# SPI) always takes precedence over the value below.
#
# The page that renders the MFA login UI (the `totpui:authentication` component shipped by
# the mfa-factors-login-ui module). Unauthenticated users hitting a protected resource are
# redirected here instead of /cms/login.
# - Leave empty (default) and configure per-site instead, or to keep Jahia's default login
#   handling on sites that set no URL.
# - When set, the URL must be a Jahia page path reachable WITHOUT authentication that carries
#   the site key. Example: /sites/mySite/login.html
loginUrl=

# Optional custom sign-out page (global default; overridable per site). Leave empty to use
# Jahia's default logout handling. Example: /sites/mySite/logout.html
logoutUrl=
