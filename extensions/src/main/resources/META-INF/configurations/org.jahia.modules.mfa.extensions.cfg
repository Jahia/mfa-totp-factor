# default configuration - won't be overridden
# MFA shared extensions configuration. The marker line above tells Jahia's module extender NOT
# to overwrite the deployed <karaf>/etc/org.jahia.modules.mfa.extensions.cfg on restart, so
# operator edits survive; the components re-read them live (on @Modified).
#
# This PID is shared by the factor-agnostic infrastructure in the mfa-factors-extensions bundle:
# the /cms/login gate (MfaLoginGateFilter) and — see the section added by the login/logout URL
# provider — the redirect URLs. It replaces the equivalent keys that previously lived under
# org.jahia.modules.totp. MIGRATION: existing deployments must move loginGate.* (and loginUrl /
# logoutUrl) from org.jahia.modules.totp to this PID.

# --- /cms/login gate (MfaLoginGateFilter) --------------------------------------
# Jahia's legacy /cms/login endpoint authenticates with username/password only and
# never consults MFA factors — on a site that ENFORCES enrollment (TOTP, WebAuthn, ...)
# it is a complete second-factor bypass. When enabled, this gate rejects /cms/login
# with 403 while enrollment is enforced (on the request's site when identifiable via
# the `site` parameter, otherwise when ANY site enforces), unless the client IP
# matches the whitelist below.
#
# OFF by default on purpose: enabling it with an empty whitelist locks everyone
# (including platform administrators) out of /cms/login as soon as one site
# enforces enrollment. Set the whitelist FIRST, then flip this to true.
loginGate.enabled=false

# Comma-separated IPv4/IPv6 addresses or CIDR blocks allowed through the gate.
# The client IP is the FIRST X-Forwarded-For entry when present (set by your
# reverse proxy), else the socket address. SECURITY: X-Forwarded-For is
# client-spoofable — only enable the gate behind a proxy that overwrites it.
# Example: loginGate.ipWhitelist=203.0.113.7, 10.0.0.0/8, 2001:db8::/32
loginGate.ipWhitelist=
