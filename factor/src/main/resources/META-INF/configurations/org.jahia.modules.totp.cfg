# Default configuration for the TOTP MFA factor module, can be edited.
# This file is copied to <karaf>/etc/org.jahia.modules.totp.cfg on first deploy;
# subsequent edits there are picked up live (the components re-read on @Modified).

# --- Login / logout URL provider (MfaTotpLoginLogoutProvider) ------------------
# These are the GLOBAL DEFAULTS. Each site can override them from its TOTP
# administration page (Two-factor authentication settings); a per-site value
# always takes precedence over the value below.
#
# The page that renders the TOTP MFA login UI (the `totpui:authentication`
# component shipped by the mfa-totp-factor-login-ui module). Unauthenticated
# users hitting a protected resource are redirected here instead of /cms/login.
# - Leave empty (default) and configure per-site instead, or to keep Jahia's
#   default login handling on sites that set no URL.
# - When set, the URL must be a Jahia page path that is reachable WITHOUT
#   authentication and carries the site key. Example: /sites/mySite/login.html
loginUrl=

# Optional custom sign-out page (global default; overridable per site). Leave
# empty to use Jahia's default logout handling. Example: /sites/mySite/logout.html
logoutUrl=

# --- Secret encryption (TotpSecretCipher) --------------------------------------
# Base64-encoded 256-bit AES key used to encrypt TOTP secrets at rest. Leave
# empty to let the module auto-generate and persist a key under the Jahia var
# directory (<jahiaVarDir>/mfa-totp-factor/secret.key).
# secret.encryption.key=
