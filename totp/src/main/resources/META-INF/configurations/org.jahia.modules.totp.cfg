# Default configuration for the TOTP MFA factor module, can be edited.
# This file is copied to <karaf>/etc/org.jahia.modules.totp.cfg on first deploy;
# subsequent edits there are picked up live (the components re-read on @Modified).

# --- Login / logout URL provider (MfaTotpLoginLogoutProvider) ------------------
# These are the GLOBAL DEFAULTS. Each site can override them from its TOTP
# administration page (Two-factor authentication settings); a per-site value
# always takes precedence over the value below.
#
# The page that renders the TOTP MFA login UI (the `totpui:authentication`
# component shipped by the mfa-factors-login-ui module). Unauthenticated
# users hitting a protected resource are redirected here instead of /cms/login.
# - Leave empty (default) and configure per-site instead, or to keep Jahia's
#   default login handling on sites that set no URL.
# - When set, the URL must be a Jahia page path that is reachable WITHOUT
#   authentication and carries the site key. Example: /sites/mySite/login.html
loginUrl=

# Optional custom sign-out page (global default; overridable per site). Leave
# empty to use Jahia's default logout handling. Example: /sites/mySite/logout.html
logoutUrl=

# --- /cms/login gate (TotpLoginGateFilter) -------------------------------------
# Jahia's legacy /cms/login endpoint authenticates with username/password only and
# never consults MFA factors — on a site that ENFORCES TOTP enrollment it is a
# complete second-factor bypass. When enabled, this gate rejects /cms/login with
# 403 while enrollment is enforced (on the request's site when identifiable via
# the `site` parameter, otherwise when ANY site enforces), unless the client IP
# matches the whitelist below.
#
# OFF by default on purpose: enabling it with an empty whitelist locks everyone
# (including platform administrators) out of /cms/login as soon as one site
# enforces enrollment. Set the whitelist FIRST, then flip this to true.
loginGate.enabled=false

# Comma-separated IPv4/IPv6 addresses or CIDR blocks allowed through the gate.
# The client IP is the FIRST X-Forwarded-For entry when present (set by your
# reverse proxy), else the socket address. SECURITY: X-Forwarded-For is
# client-spoofable — only enable the gate behind a proxy that overwrites it.
# Example: loginGate.ipWhitelist=203.0.113.7, 10.0.0.0/8, 2001:db8::/32
loginGate.ipWhitelist=

# --- Secret encryption (TotpSecretCipher) --------------------------------------
# Base64-encoded 256-bit AES key used to encrypt TOTP secrets at rest. Leave
# empty to let the module auto-generate and persist a key under the Jahia var
# directory (<jahiaVarDir>/mfa-factors/secret.key; a pre-rename
# <jahiaVarDir>/mfa-totp-factor/secret.key is still read as a fallback).
# secret.encryption.key=
